name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install black ruff pytest
    
    - name: Run Black formatter check
      run: black --check src/ tests/ train.py
    
    - name: Run Ruff linter
      run: ruff check src/ tests/ train.py

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Run tests
      run: |
        pytest tests/ --cov=src --cov-report=xml --cov-report=term-missing
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  build-test:
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Test data generation
      run: |
        python -c "
        import sys
        sys.path.append('src')
        from pipelines.data_pipeline import SensorDataGenerator
        from utils.config import DataConfig
        config = DataConfig()
        generator = SensorDataGenerator(config)
        X_train, X_test, y_train, y_test = generator.generate_dataset()
        print(f'Generated dataset: {X_train.shape[0]} train, {X_test.shape[0]} test samples')
        "
    
    - name: Test model creation
      run: |
        python -c "
        import sys
        sys.path.append('src')
        from models.tensorflow_models import TensorFlowActivityCNN
        from models.pytorch_models import ActivityRecognitionCNN
        from utils.config import ModelConfig
        config = ModelConfig()
        
        # Test TensorFlow model
        try:
            tf_model = TensorFlowActivityCNN(config)
            print('TensorFlow model created successfully')
        except Exception as e:
            print(f'TensorFlow model creation failed: {e}')
        
        # Test PyTorch model
        try:
            import torch
            pt_model = ActivityRecognitionCNN(config)
            print('PyTorch model created successfully')
        except Exception as e:
            print(f'PyTorch model creation failed: {e}')
        "

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit
    
    - name: Run safety check
      run: safety check
    
    - name: Run bandit security check
      run: bandit -r src/ -f json -o bandit-report.json || true
    
    - name: Upload bandit report
      uses: actions/upload-artifact@v3
      with:
        name: bandit-report
        path: bandit-report.json

  documentation:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Check documentation
      run: |
        # Check if README exists and has required sections
        if [ -f README.md ]; then
          echo "README.md exists"
          if grep -q "DISCLAIMER" README.md; then
            echo "Safety disclaimer found in README"
          else
            echo "WARNING: Safety disclaimer not found in README"
          fi
        else
          echo "ERROR: README.md not found"
          exit 1
        fi
        
        # Check if DISCLAIMER.md exists
        if [ -f DISCLAIMER.md ]; then
          echo "DISCLAIMER.md exists"
        else
          echo "ERROR: DISCLAIMER.md not found"
          exit 1
        fi
